name: Build APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Setup Android SDK
        run: |
          # Download cmdline-tools
          mkdir -p $HOME/android/cmdline-tools
          cd $HOME/android/cmdline-tools
          curl -sLo tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q tools.zip
          mv cmdline-tools latest
          echo "ANDROID_SDK_ROOT=$HOME/android" >> $GITHUB_ENV
          echo "$HOME/android/cmdline-tools/latest/bin" >> $GITHUB_PATH

          # Accept licenses & install required SDK
          yes | $HOME/android/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1
          $HOME/android/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" > /dev/null 2>&1

      - name: Build APK
        run: |
          cd android
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.5
          fi
          chmod +x gradlew
          ANDROID_HOME=$HOME/android ./gradlew assembleRelease --no-daemon

      - name: Sign APK (debug key)
        run: |
          keytool -genkey -v -keystore debug.keystore -alias debug \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android -dname "CN=Dev,OU=Dev,O=Dev,L=City,ST=State,C=CN"
          jarsigner -verbose -sigalg SHA1withRSA -digestalg SHA1 \
            -keystore debug.keystore -storepass android \
            android/app/build/outputs/apk/release/app-release-unsigned.apk debug
          mv android/app/build/outputs/apk/release/app-release-unsigned.apk RAG-Chat-v1.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rag-chat-apk
          path: RAG-Chat-v1.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: RAG-Chat-v1.apk
